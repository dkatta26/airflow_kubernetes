# Airflow Custom Helm Chart - v3
# Easy switching between Git-Sync and NFS for DAG management
# All 3 original issues fixed + flexible DAG storage

# =============================================================================
# IMAGE CONFIGURATION
# =============================================================================
image:
  repository: dkatta26/diveshkattaregistry
  tag: "2.8.3"
  pullPolicy: IfNotPresent

# =============================================================================
# POSTGRESQL CONFIGURATION (External on Host Machine)
# =============================================================================
postgresql:
  enabled: true
  external: true

  # ⚠️ CHANGE THIS to your host machine IP!
  host: "192.168.1.100"
  port: 5432
  username: airflow
  password: airflow123
  database: airflow
  # Managed Postgres / TLS: e.g. require | verify-full | disable (empty = omit ?sslmode from URL)
  sslmode: ""

# =============================================================================
# REDIS CONFIGURATION (Only needed for CeleryExecutor)
# =============================================================================
redis:
  enabled: false  # Set to true when using CeleryExecutor
  password: redis123
  image:
    repository: redis
    tag: "7-alpine"
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

# =============================================================================
# AIRFLOW CONFIGURATION
# =============================================================================
airflow:
  executor: KubernetesExecutor  # Options: LocalExecutor | CeleryExecutor | KubernetesExecutor

  # true = load settings from Helm-generated ConfigMap (AIRFLOW__… env). false = use airflow.cfg only from NAS mount (see externalAirflowCfg).
  # Env vars override airflow.cfg when both are present.
  useConfigMapForEnv: true

  # Mount airflow.cfg from a PVC backed by NAS/NFS. Set useConfigMapForEnv: false for cfg-only mode (see docs/EXTERNAL_AIRFLOW_CFG.md).
  externalAirflowCfg:
    enabled: false
    existingClaim: ""   # PVC name (must exist in the release namespace)
    subPath: airflow.cfg
    mountPath: /opt/airflow/airflow.cfg

  # All AIRFLOW__* env vars injected into the ConfigMap.
  # Add any Airflow setting here — no template changes needed.
  config:
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__TEST_CONNECTION: "Enabled"

  # Kubernetes Executor settings (used only when executor is KubernetesExecutor)
  kubernetesExecutor:
    namespace: ""                 # empty = release namespace
    workerContainerRepository: "" # empty = image.repository
    workerContainerTag: ""        # empty = image.tag
    deleteWorkerPods: true
    deleteWorkerPodsOnFailure: false
    workerPodsCreationBatchSize: "4"  # Increase for better throughput
    # Task pods need envFrom → same ConfigMap as scheduler (Postgres, etc.); see docs/K8S_WORKER_PODS_CONFIGMAP.md
    podTemplate:
      enabled: true

# =============================================================================
# DAG STORAGE CONFIGURATION
# Choose ONE method: gitSync OR nfs OR hostPath (for single node)
# =============================================================================
dags:
  # -----------------------------------------------------------------------------
  # METHOD 1: Git-Sync (Recommended for Multi-Node + Version Control)
  # Easy to switch on/off - just change 'enabled: true/false'
  # -----------------------------------------------------------------------------
  gitSync:
    enabled: false  # ← Set to 'true' to use Git-Sync

    # For public repositories (HTTPS):
    repo: "https://github.com/your-org/airflow-dags.git"
    branch: "main"

    # For private repositories (SSH) - uncomment and configure:
    # repo: "git@github.com:your-org/airflow-dags.git"
    # sshKeySecret: "airflow-git-ssh-key"  # Create secret first

    # Git-sync settings:
    rev: "HEAD"
    depth: 1
    wait: 60  # Sync interval in seconds
    maxFailures: 3

    # Subpath in repo (if DAGs are not in root):
    subPath: ""  # e.g., "dags/" if your DAGs are in a subdirectory

    # Resources for git-sync sidecar:
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

  # -----------------------------------------------------------------------------
  # METHOD 2: NFS (Recommended for Multi-Node + Filesystem Access)
  # Easy to switch on/off - just change 'enabled: true/false'
  # -----------------------------------------------------------------------------
  nfs:
    enabled: false  # ← Set to 'true' to use NFS

    server: "nfs-server.example.com"  # ← Your NFS server hostname/IP
    path: "/exports/airflow/dags"     # ← Path on NFS server

    # Optional: NFS mount options
    mountOptions:
      - nfsvers=4
      - rsize=1048576
      - wsize=1048576

  # -----------------------------------------------------------------------------
  # METHOD 3: HostPath (Only for Single-Node Clusters)
  # -----------------------------------------------------------------------------
  hostPath:
    enabled: false  # ← Set to 'true' for single-node with hostPath
    path: "/opt/airflow/dags"  # Path on host machine

  # -----------------------------------------------------------------------------
  # METHOD 4: Persistent Volume Claim (Advanced)
  # -----------------------------------------------------------------------------
  persistentVolumeClaim:
    enabled: false  # ← Set to 'true' to use existing PVC
    existingClaim: ""  # Name of your PVC (must support ReadWriteMany)
    subPath: ""        # Optional: subfolder inside the PVC (e.g. "dags" if sharing PVC with logs)

# =============================================================================
# LOGS STORAGE CONFIGURATION
# =============================================================================
# ⚠️  With KubernetesExecutor, task pods are deleted after completion.
#     If logs use emptyDir (default), they are LOST when the pod is deleted.
#     Enable NFS or PVC below so logs survive pod deletion and remain readable
#     in the Airflow UI.
#
# Choose ONE method. All Airflow components AND task pods share the same volume.
logs:
  # METHOD 1: NFS (recommended for multi-node — logs persist after pod deletion)
  nfs:
    enabled: false  # ← Set to 'true' to store logs on NFS
    server: "nfs-server.example.com"
    path: "/exports/airflow/logs"

  # METHOD 2: Existing PVC (ReadWriteMany required for multi-node)
  persistentVolumeClaim:
    enabled: false
    existingClaim: ""  # PVC name (must exist in the release namespace)
    subPath: ""        # Optional: subfolder inside the PVC (e.g. "logs" if sharing PVC with dags)

  # METHOD 3: HostPath (single-node only)
  hostPath:
    enabled: false  # ← Set to 'true' for single-node
    path: "/opt/airflow/logs"

  # Default: emptyDir — logs are lost when a pod is deleted (not suitable for KubernetesExecutor)

# =============================================================================
# NAS CUSTOM SCRIPTS PVC
# Mounts a NAS-backed PVC at /opt/data across all components and task pods.
# =============================================================================
nasScripts:
  enabled: false
  existingClaim: ""   # PVC name (must exist in the release namespace)
  mountPath: /opt/data
  readOnly: true

# =============================================================================
# SCHEDULER CONFIGURATION
# =============================================================================
scheduler:
  enabled: true
  replicas: 1
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 1000m
      memory: 2Gi
  livenessProbe:
    enabled: true
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 20
    failureThreshold: 5

# =============================================================================
# WEBSERVER CONFIGURATION
# =============================================================================
webserver:
  enabled: true
  replicas: 2
  service:
    type: ClusterIP   # Use NodePort if you need direct node access and namespace allows it
    port: 8080
    # nodePort: 30080  # Only used when type: NodePort
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  livenessProbe:
    enabled: true
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 20
    failureThreshold: 5
  readinessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 20
    failureThreshold: 5
  defaultUser:
    username: admin
    password: admin
    email: admin@example.com

# =============================================================================
# OPENSHIFT ROUTE (optional — exposes webserver; use with ClusterIP Service)
# =============================================================================
# Same pattern as Trino: Route -> Service (ClusterIP) -> Pods.
# Set host to your apps domain, e.g. bdp-airflow-qa.apps.ap3-ocp4-qa.pncint.net
# If host is empty, OpenShift assigns a hostname (see: oc get route).
route:
  enabled: false
  host: ""   # e.g. "bdp-airflow-qa.apps.ap3-ocp4-qa.pncint.net"
  path: /
  # Must match the webserver Service port name (see templates/webserver.yaml) or numeric port
  targetPort: http
  annotations: {}
  tls:
    enabled: true
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

# =============================================================================
# WORKER CONFIGURATION (Celery workers - only used when executor is CeleryExecutor)
# =============================================================================
workers:
  enabled: false  # Set to true when using CeleryExecutor
  replicas: 3
  concurrency: 16
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 1000m
      memory: 2Gi
  livenessProbe:
    enabled: true
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 20
    failureThreshold: 5

# =============================================================================
# TRIGGERER CONFIGURATION
# =============================================================================
triggerer:
  enabled: true
  replicas: 1
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi

# =============================================================================
# SERVICE ACCOUNT & RBAC
# =============================================================================
serviceAccount:
  create: true
  name: airflow
  # Annotations for cloud provider integrations (AWS IRSA, GCP Workload Identity, etc.)
  annotations: {}
  # Example for AWS IRSA:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/airflow-role
  # Example for GCP Workload Identity:
  #   iam.gke.io/gcp-service-account: airflow@project.iam.gserviceaccount.com

rbac:
  create: true

# =============================================================================
# WORKER POD CLEANUP
# Periodic CronJob to delete completed/failed KubernetesExecutor task pods.
# Set deleteWorkerPods: false above to keep pods around, then use this to
# clean them up on a schedule so you have time to inspect logs.
# =============================================================================
workerCleanup:
  enabled: false
  schedule: "*/10 * * * *"  # every 10 minutes — adjust to taste
  deleteSucceeded: true      # delete pods in Succeeded phase
  deleteFailed: false        # set true to also delete Failed pods (useful after inspection)
  # Optional: restrict deletion to pods with this label selector.
  # Airflow 2.x tags task pods with dag_id, task_id etc.
  # Example: "dag_id=my_dag" or leave empty to clean all completed pods in the namespace.
  podLabelSelector: ""
  image:
    repository: bitnami/kubectl
    tag: "latest"
    pullPolicy: IfNotPresent
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# =============================================================================
# DATABASE INITIALIZATION
# =============================================================================
dbInit:
  enabled: true
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi

# =============================================================================
# EXAMPLES FOR DIFFERENT SCENARIOS
# =============================================================================
#
# SCENARIO 1: Use Git-Sync with public repo
# ------------------------------------------
# dags:
#   gitSync:
#     enabled: true
#     repo: "https://github.com/your-org/airflow-dags.git"
#     branch: "main"
#   nfs:
#     enabled: false
#
# SCENARIO 2: Use Git-Sync with private repo
# -------------------------------------------
# 1. Create SSH key: ssh-keygen -t rsa -b 4096 -f airflow-git-key -N ""
# 2. Add public key to GitHub as deploy key
# 3. Create secret: kubectl create secret generic airflow-git-ssh-key \
#                     --from-file=ssh=airflow-git-key -n airflow
# 4. Update values:
#    dags:
#      gitSync:
#        enabled: true
#        repo: "git@github.com:your-org/airflow-dags.git"
#        sshKeySecret: "airflow-git-ssh-key"
#      nfs:
#        enabled: false
#
# SCENARIO 3: Use NFS
# -------------------
# dags:
#   gitSync:
#     enabled: false
#   nfs:
#     enabled: true
#     server: "192.168.1.50"
#     path: "/exports/airflow/dags"
#
# SCENARIO 4: Switch from Git to NFS
# -----------------------------------
# Just flip the enabled flags:
#   dags:
#     gitSync:
#       enabled: false  # Turn OFF Git
#     nfs:
#       enabled: true   # Turn ON NFS
# Then: helm upgrade my-airflow . -n airflow
#
# =============================================================================
