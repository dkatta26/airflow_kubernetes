# Airflow Custom Helm Chart - v3
# Easy switching between Git-Sync and NFS for DAG management
# All 3 original issues fixed + flexible DAG storage

# =============================================================================
# IMAGE CONFIGURATION
# =============================================================================
image:
  repository: dkatta26/diveshkattaregistry
  tag: "2.8.3"
  pullPolicy: IfNotPresent

# =============================================================================
# POSTGRESQL CONFIGURATION (External on Host Machine)
# =============================================================================
postgresql:
  enabled: true
  external: true
  
  # ⚠️ CHANGE THIS to your host machine IP!
  host: "192.168.1.100"
  port: 5432
  username: airflow
  password: airflow123
  database: airflow

# =============================================================================
# REDIS CONFIGURATION (Only needed for CeleryExecutor)
# =============================================================================
redis:
  enabled: false  # Set to true when using CeleryExecutor
  password: redis123
  image:
    repository: redis
    tag: "7-alpine"
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

# =============================================================================
# AIRFLOW CONFIGURATION
# =============================================================================
airflow:
  executor: KubernetesExecutor  # Options: LocalExecutor | CeleryExecutor | KubernetesExecutor
  config:
    AIRFLOW__CORE__EXECUTOR: "KubernetesExecutor"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"

  # Kubernetes Executor settings (used only when executor is KubernetesExecutor)
  kubernetesExecutor:
    # Namespace where task pods are created (default: same as release)
    namespace: ""  # Leave empty to use release namespace
    # Worker image (defaults to main airflow image if not set)
    workerContainerRepository: ""  # e.g. "dkatta26/diveshkattaregistry"
    workerContainerTag: ""         # e.g. "2.8.3"
    deleteWorkerPods: true
    deleteWorkerPodsOnFailure: false
    workerPodsCreationBatchSize: "4"  # Increase for better throughput

# =============================================================================
# DAG STORAGE CONFIGURATION
# Choose ONE method: gitSync OR nfs OR hostPath (for single node)
# =============================================================================
dags:
  # -----------------------------------------------------------------------------
  # METHOD 1: Git-Sync (Recommended for Multi-Node + Version Control)
  # Easy to switch on/off - just change 'enabled: true/false'
  # -----------------------------------------------------------------------------
  gitSync:
    enabled: false  # ← Set to 'true' to use Git-Sync
    
    # For public repositories (HTTPS):
    repo: "https://github.com/your-org/airflow-dags.git"
    branch: "main"
    
    # For private repositories (SSH) - uncomment and configure:
    # repo: "git@github.com:your-org/airflow-dags.git"
    # sshKeySecret: "airflow-git-ssh-key"  # Create secret first
    
    # Git-sync settings:
    rev: "HEAD"
    depth: 1
    wait: 60  # Sync interval in seconds
    maxFailures: 3
    
    # Subpath in repo (if DAGs are not in root):
    subPath: ""  # e.g., "dags/" if your DAGs are in a subdirectory
    
    # Resources for git-sync sidecar:
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi
  
  # -----------------------------------------------------------------------------
  # METHOD 2: NFS (Recommended for Multi-Node + Filesystem Access)
  # Easy to switch on/off - just change 'enabled: true/false'
  # -----------------------------------------------------------------------------
  nfs:
    enabled: false  # ← Set to 'true' to use NFS
    
    server: "nfs-server.example.com"  # ← Your NFS server hostname/IP
    path: "/exports/airflow/dags"     # ← Path on NFS server
    
    # Optional: NFS mount options
    mountOptions:
      - nfsvers=4
      - rsize=1048576
      - wsize=1048576
  
  # -----------------------------------------------------------------------------
  # METHOD 3: HostPath (Only for Single-Node Clusters)
  # -----------------------------------------------------------------------------
  hostPath:
    enabled: false  # ← Set to 'true' for single-node with hostPath
    path: "/opt/airflow/dags"  # Path on host machine
  
  # -----------------------------------------------------------------------------
  # METHOD 4: Persistent Volume Claim (Advanced)
  # -----------------------------------------------------------------------------
  persistentVolumeClaim:
    enabled: false  # ← Set to 'true' to use existing PVC
    existingClaim: ""  # Name of your PVC (must support ReadWriteMany)

# =============================================================================
# LOGS STORAGE CONFIGURATION
# =============================================================================
logs:
  # For multi-node, use NFS or leave as emptyDir
  # emptyDir = logs lost on pod restart (usually acceptable)
  
  nfs:
    enabled: false  # ← Set to 'true' to store logs on NFS
    server: "nfs-server.example.com"
    path: "/exports/airflow/logs"
  
  hostPath:
    enabled: false  # ← Set to 'true' for single-node
    path: "/opt/airflow/logs"

# =============================================================================
# SCHEDULER CONFIGURATION
# =============================================================================
scheduler:
  enabled: true
  replicas: 1
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 1000m
      memory: 2Gi
  livenessProbe:
    enabled: true
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 20
    failureThreshold: 5

# =============================================================================
# WEBSERVER CONFIGURATION
# =============================================================================
webserver:
  enabled: true
  replicas: 2
  service:
    type: NodePort
    port: 8080
    nodePort: 30080  # Fixed port - access via http://<any-node-ip>:30080
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  livenessProbe:
    enabled: true
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 20
    failureThreshold: 5
  readinessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 20
    failureThreshold: 5
  defaultUser:
    username: admin
    password: admin
    email: admin@example.com

# =============================================================================
# WORKER CONFIGURATION (Celery workers - only used when executor is CeleryExecutor)
# =============================================================================
workers:
  enabled: false  # Set to true when using CeleryExecutor
  replicas: 3
  concurrency: 16
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 1000m
      memory: 2Gi
  livenessProbe:
    enabled: true
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 20
    failureThreshold: 5

# =============================================================================
# TRIGGERER CONFIGURATION
# =============================================================================
triggerer:
  enabled: true
  replicas: 1
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi

# =============================================================================
# SERVICE ACCOUNT & RBAC
# =============================================================================
serviceAccount:
  create: true
  name: airflow
  # Annotations for cloud provider integrations (AWS IRSA, GCP Workload Identity, etc.)
  annotations: {}
  # Example for AWS IRSA:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/airflow-role
  # Example for GCP Workload Identity:
  #   iam.gke.io/gcp-service-account: airflow@project.iam.gserviceaccount.com

rbac:
  create: true

# =============================================================================
# DATABASE INITIALIZATION
# =============================================================================
dbInit:
  enabled: true
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi

# =============================================================================
# EXAMPLES FOR DIFFERENT SCENARIOS
# =============================================================================
# 
# SCENARIO 1: Use Git-Sync with public repo
# ------------------------------------------
# dags:
#   gitSync:
#     enabled: true
#     repo: "https://github.com/your-org/airflow-dags.git"
#     branch: "main"
#   nfs:
#     enabled: false
#
# SCENARIO 2: Use Git-Sync with private repo
# -------------------------------------------
# 1. Create SSH key: ssh-keygen -t rsa -b 4096 -f airflow-git-key -N ""
# 2. Add public key to GitHub as deploy key
# 3. Create secret: kubectl create secret generic airflow-git-ssh-key \
#                     --from-file=ssh=airflow-git-key -n airflow
# 4. Update values:
#    dags:
#      gitSync:
#        enabled: true
#        repo: "git@github.com:your-org/airflow-dags.git"
#        sshKeySecret: "airflow-git-ssh-key"
#      nfs:
#        enabled: false
#
# SCENARIO 3: Use NFS
# -------------------
# dags:
#   gitSync:
#     enabled: false
#   nfs:
#     enabled: true
#     server: "192.168.1.50"
#     path: "/exports/airflow/dags"
#
# SCENARIO 4: Switch from Git to NFS
# -----------------------------------
# Just flip the enabled flags:
#   dags:
#     gitSync:
#       enabled: false  # Turn OFF Git
#     nfs:
#       enabled: true   # Turn ON NFS
# Then: helm upgrade my-airflow . -n airflow
#
# =============================================================================
