{{- if .Values.webserver.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "airflow.fullname" . }}-webserver
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "airflow.labels" . | nindent 4 }}
    component: webserver
spec:
  replicas: {{ .Values.webserver.replicas }}
  selector:
    matchLabels:
      {{- include "airflow.selectorLabels" . | nindent 6 }}
      component: webserver
  template:
    metadata:
      labels:
        {{- include "airflow.selectorLabels" . | nindent 8 }}
        component: webserver
    spec:
      serviceAccountName: {{ include "airflow.serviceAccountName" . }}
      containers:
      - name: webserver
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["bash", "-c"]
        args:
          - |
            airflow users create \
              --username {{ .Values.webserver.defaultUser.username }} \
              --firstname Admin \
              --lastname User \
              --role Admin \
              --email {{ .Values.webserver.defaultUser.email }} \
              --password {{ .Values.webserver.defaultUser.password }} || echo "Admin user already exists"
            exec airflow webserver
        ports:
        - name: http
          containerPort: {{ .Values.webserver.service.port }}
          protocol: TCP
        {{- if .Values.airflow.useConfigMapForEnv }}
        envFrom:
        - configMapRef:
            name: {{ include "airflow.fullname" . }}-config
        {{- end }}
        volumeMounts:
        {{- include "airflow.dagsVolumeMount" . | nindent 8 }}
        {{- include "airflow.logsVolumeMount" . | nindent 8 }}
        {{- if .Values.airflow.externalAirflowCfg.enabled }}
        {{- include "airflow.externalAirflowCfgVolumeMount" . | nindent 8 }}
        {{- end }}
        {{- include "airflow.nasScriptsVolumeMount" . | nindent 8 }}
        {{- if .Values.webserver.webserverConfigPy }}
        - name: webserver-config
          mountPath: /opt/airflow/webserver_config.py
          subPath: webserver_config.py
          readOnly: true
        {{- end }}
        resources:
          {{- toYaml .Values.webserver.resources | nindent 10 }}
        {{- if .Values.webserver.livenessProbe.enabled }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: {{ .Values.webserver.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.webserver.livenessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.webserver.livenessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.webserver.livenessProbe.failureThreshold }}
        {{- end }}
        {{- if .Values.webserver.readinessProbe.enabled }}
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: {{ .Values.webserver.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.webserver.readinessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.webserver.readinessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.webserver.readinessProbe.failureThreshold }}
        {{- end }}
      {{- include "airflow.gitSyncContainer" . | nindent 6 }}
      volumes:
      {{- if .Values.dags.gitSync.enabled }}
      - name: dags
        emptyDir: {}
      {{- else }}
      {{- include "airflow.dagsVolume" . | nindent 6 }}
      {{- end }}
      {{- include "airflow.logsVolume" . | nindent 6 }}
      {{- include "airflow.gitSyncVolume" . | nindent 6 }}
      {{- if .Values.airflow.externalAirflowCfg.enabled }}
      {{- include "airflow.externalAirflowCfgVolume" . | nindent 6 }}
      {{- end }}
      {{- include "airflow.nasScriptsVolume" . | nindent 6 }}
      {{- if .Values.webserver.webserverConfigPy }}
      - name: webserver-config
        configMap:
          name: {{ include "airflow.fullname" . }}-webserver-config
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "airflow.fullname" . }}-webserver
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "airflow.labels" . | nindent 4 }}
    component: webserver
spec:
  type: {{ .Values.webserver.service.type }}
  ports:
  - port: {{ .Values.webserver.service.port }}
    targetPort: http
    protocol: TCP
    name: http
    {{- if and (eq .Values.webserver.service.type "NodePort") .Values.webserver.service.nodePort }}
    nodePort: {{ .Values.webserver.service.nodePort }}
    {{- end }}
  selector:
    {{- include "airflow.selectorLabels" . | nindent 4 }}
    component: webserver
{{- end }}
