{{- if .Values.dbInit.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "airflow.fullname" . }}-db-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "airflow.labels" . | nindent 4 }}
    component: db-init
  # ✅ FIXED: Removed Helm hooks - now runs as regular job alongside other resources
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "airflow.selectorLabels" . | nindent 8 }}
        component: db-init
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "airflow.serviceAccountName" . }}
      {{- if .Values.redis.enabled }}
      # Wait for Redis before starting (only when using CeleryExecutor)
      initContainers:
      - name: wait-for-redis
        image: busybox:1.36
        command:
          - sh
          - -c
          - |
            echo "Waiting for Redis to be ready..."
            until nc -z {{ include "airflow.fullname" . }}-redis 6379; do
              echo "Redis not ready yet, waiting..."
              sleep 5
            done
            echo "Redis is ready!"
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
      {{- end }}
      containers:
      - name: db-init
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["bash", "-c"]
        args:
          - |
            echo "========================================="
            echo "Airflow Database Initialization"
            echo "========================================="
            
            echo "Waiting for database to be ready..."
            sleep 10
            
            echo "Running database migrations..."
            airflow db init || airflow db migrate
            
            if [ $? -eq 0 ]; then
              echo "✅ Database initialized successfully!"
            else
              echo "❌ Database initialization failed!"
              exit 1
            fi
            
            echo "Creating admin user..."
            airflow users create \
              --username {{ .Values.webserver.defaultUser.username }} \
              --firstname Admin \
              --lastname User \
              --role Admin \
              --email {{ .Values.webserver.defaultUser.email }} \
              --password {{ .Values.webserver.defaultUser.password }} || echo "User might already exist"
            
            echo "========================================="
            echo "✅ Database initialization complete!"
            echo "========================================="
        envFrom:
        - configMapRef:
            name: {{ include "airflow.fullname" . }}-config
        resources:
          {{- toYaml .Values.dbInit.resources | nindent 10 }}
{{- end }}
